# ChronusGateway-RS — example gateway configuration (Milestone 8).
# Copy to e.g. `gateway.toml` and run: `chronus-gateway --config gateway.toml`
# Or set: CHRONUS_GATEWAY_CONFIG=gateway.toml
#
# Omitted `[ingest]` or `[station]` sections fall back to the same defaults as running with no file.
# When `[station]` is present, set exactly one of `tle_inline` or `tle_file` (paths are relative to
# the process working directory unless given as absolute).

[ingest]
bind_addr = "127.0.0.1:7301"
channel_capacity = 1024
max_datagram_size = 65542
http_bind = "127.0.0.1:8080"

[station]
latitude_deg = 35.0
longitude_deg = -116.0
altitude_m = 1000.0
nominal_carrier_hz = 437500000.0
min_recompute_interval_ms = 10
doppler_tolerance_hz = 150.0
minimum_elevation_deg = 0.0

# Synthetic link-budget parameters (CV-1 / T-RSSI); optional — omitted keys use defaults.
# tx_power_dbm = 30.0
# tx_gain_dbi = 2.0
# rx_gain_dbi = 5.0
# link_budget_tolerance_db = 3.0
# Pointing residual tolerance (CV-2 / T-POINT); optional — default 0.25°.
# pointing_tolerance_deg = 0.25

# Synthetic HIL TM v1 APID inclusive band (CV-3); optional — defaults 0x7B0 … 0x7BF.
# hil_tm_v1_apid_min = 1968
# hil_tm_v1_apid_max = 1983

# CV-4 toy subsystem maps (optional — defaults match `StationConfig::default` / NeXosim driver).
# hil_eps_voltage_full_sun_v = 28.0
# hil_eps_voltage_eclipse_v = 24.0
# hil_thermal_c_full_sun = 32.0
# hil_thermal_c_eclipse = 12.0
# hil_eps_relative_tolerance = 0.1
# hil_thermal_absolute_tolerance_k = 10.0

# Public reference ISS (ZARYA) element set — synthetic/public data only (see README / Methodology).
tle_inline = """
ISS (ZARYA)
1 25544U 98067A   20194.88612269 -.00002218  00000-0 -31515-4 0  9992
2 25544  51.6461 221.2784 0001413  89.1723 280.4612 15.49507896236008
"""

# Alternative: load TLE from a UTF-8 text file (two- or three-line set).
# tle_file = "path/to/elements.tle"
