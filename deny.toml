# cargo-deny configuration (Milestone 6). Run: `cargo deny check` from workspace root.
# Advisory database is fetched on first run.

[advisories]
version = 2
yanked = "deny"
# Transitive unmaintained crates (no semver-safe upgrade in our graph yet). See Methodology.md D-019.
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode 2.x unmaintained; only via nexosim (HIL). Await upstream; not a CVE (project halt)." },
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained; via spacepackets 0.17 (CCSDS). Await upstream; compile-time macro, no CVE." },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "0BSD",
    "Unlicense",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
