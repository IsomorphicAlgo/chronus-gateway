# CI: tests, clippy, supply-chain gates. Ephemerust is checked out as a sibling (path dependency).
#
# Ephemerust must always be cloned from the upstream repo (IsomorphicAlgo/Ephemerust). Using
# github.repository_owner would break fork PRs (e.g. contributor/Ephemerust does not exist).
# cargo test exits with code 101 when tests fail; compile/link errors use other codes.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gateway
        uses: actions/checkout@v5
        with:
          path: chronus-gateway

      # Path ../Ephemerust from chronus-gateway/ must exist at workspace root (see Cargo.toml).
      - name: Checkout Ephemerust (upstream sibling)
        uses: actions/checkout@v5
        with:
          repository: IsomorphicAlgo/Ephemerust
          path: Ephemerust

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.89"
          components: clippy

      - name: Cargo test
        working-directory: chronus-gateway
        run: cargo test

      # Showcase S1: ensure Compose spec is valid (no full `docker build` here — too slow for PR CI).
      - name: Validate demo Docker Compose spec
        working-directory: chronus-gateway
        run: docker compose -f demo/docker-compose.yml config --quiet

      - name: Setup Node.js (demo dashboard)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build demo dashboard (Vite)
        working-directory: chronus-gateway/demo/dashboard
        run: npm install && npm run build

      - name: Compile benchmarks (Criterion)
        working-directory: chronus-gateway
        run: cargo bench --no-run

      - name: Clippy
        working-directory: chronus-gateway
        run: cargo clippy --all-targets -- -D warnings

      # Pin a crates.io version that exists (--locked uses the published lockfile). 0.21.3 was never released.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1

      - name: cargo audit
        working-directory: chronus-gateway
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.18.6

      - name: cargo deny
        working-directory: chronus-gateway
        run: cargo deny check
